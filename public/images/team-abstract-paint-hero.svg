<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">물감이 부드럽게 섞인 추상 미술치료 이미지</title>
  <desc id="desc">크림색 종이 위에 오커, 세이지, 블루, 코랄 물감이 겹겹이 번지며 섞이는 추상 이미지</desc>
  <defs>
    <radialGradient id="warm" cx="32%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#d8a348" stop-opacity="0.95"/>
      <stop offset="52%" stop-color="#c7893a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f4efe6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blue" cx="64%" cy="40%" r="54%">
      <stop offset="0%" stop-color="#5f91ac" stop-opacity="0.92"/>
      <stop offset="55%" stop-color="#86aebf" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#f4efe6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sage" cx="47%" cy="66%" r="46%">
      <stop offset="0%" stop-color="#8c9b80" stop-opacity="0.70"/>
      <stop offset="58%" stop-color="#b8c1a4" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#f4efe6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coral" cx="75%" cy="72%" r="38%">
      <stop offset="0%" stop-color="#c9826b" stop-opacity="0.68"/>
      <stop offset="60%" stop-color="#ddb2a4" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#f4efe6" stop-opacity="0"/>
    </radialGradient>
    <filter id="paper" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="4" seed="11" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.13"/>
      </feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#f6f0e5"/>

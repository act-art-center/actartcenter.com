    <path d="M136 165 C318 58 511 126 647 251 C792 385 940 286 1077 181 C1215 75 1415 106 1515 244 C1625 397 1501 617 1310 672 C1138 721 1019 646 862 724 C681 815 416 793 282 642 C145 489 -48 279 136 165Z" fill="#efe6d6" opacity="0.85"/>
